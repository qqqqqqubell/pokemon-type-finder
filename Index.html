<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 이미지 처리 프로젝트</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <div class="title-container">
        <h1 class="pokedex-title">AI 포켓몬 타입 분석기</h1>
        <p class="pokedex-subtitle">이미지를 기반으로 포켓몬의 타입을 예측합니다</p>
    </div>
    
    <div class="upload-container">
        <input type="file" id="imageInput" accept="image/*">
        
        <label for="imageInput" class="custom-file-btn">
            🔴 포켓몬 이미지 선택
        </label>
    </div>

    <img id="preview" src="" alt="미리보기" style="display:none; max-width:300px; margin: 20px auto; border-radius: 12px;">

    <button id="analyzeBtn">도감 분석 시작</button>

    <div id="loader">
        <div class="pokeball-spinner"></div>
        <p>AI가 포켓몬 타입을 분석 중입니다...</p>
    </div>

    <div id="resultArea"></div>

    <script src="pokemonType.js"></script>
</body>
    <div id="resultArea"></div>

    <div class="developer-box">
        <h3>💬 개발자의 코멘트</h3>
        <p>이 AI는 Google Colab 환경에서 CNN 기반의 학습을 통하여 개발되었습니다. 모델의 성능 테스트 결과, 정확도는 무려 <span class="highlight">66%(...)</span>로 포켓몬들의 타입을 구분하는 데 손색이 없을 것으로 여겨집니다!</p>
        <p class="joke">💡 기회가 된다면 포켓몬 이외의 이미지를 넣어보는 것은 어떨까요?</p>
    </div>

</html>
